name: Test mise

on:
  workflow_dispatch:
    inputs:
      debian_versions:
        description: 'Debian versions to build (comma-separated: bookworm, trixie, or bookworm,trixie)'
        required: true
        default: 'trixie'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
    steps:

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            curl \
            jq
            
      - name: Install mise
        run: |
          curl https://mise.jdx.dev/mise-latest-linux-x64 > /bin/mise && chmod 755 /bin/mise
          echo "mise version: $(mise version --json | jq -r .version)"
